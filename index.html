<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvyx Kalendář Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa; --card: #ffffff; --accent: #3b82f6; --text: #1a1a1a;
            --text-sec: #757575; --border: #eeeeee; --focus: #ef4444;
        }
        [data-theme="dark"] {
            --bg: #000000; --card: #1c1c1e; --accent: #0a84ff; --text: #ffffff;
            --text-sec: #8e8e93; --border: #38383a;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; overflow-x: hidden; }
        .app { width: 100%; max-width: 450px; min-height: 100vh; margin: 0 auto; padding-bottom: 100px; position: relative; }

        header { padding: 50px 20px 10px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .brand { font-size: 2.4rem; font-weight: 600; letter-spacing: -2px; }
        .widgets { display: flex; gap: 15px; font-size: 0.8rem; font-weight: 500; color: var(--accent); align-items: center; }

        .page { display: none; padding: 0 15px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CALENDAR */
        .calendar-card { background: var(--card); border-radius: 30px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .day { padding: 12px 0; font-size: 0.9rem; border-radius: 15px; cursor: pointer; position: relative; }
        .day.today { border: 1.5px solid var(--accent); color: var(--accent); font-weight: 700; }
        .day.selected { background: var(--text); color: var(--card); }
        .day.has-ev::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }

        /* MOOD */
        .mood-bar { display: flex; justify-content: space-around; margin: 20px 0; background: var(--card); padding: 10px; border-radius: 20px; border: 1px solid var(--border); }
        .mood-btn { cursor: pointer; font-size: 1.2rem; filter: grayscale(1); transition: 0.3s; opacity: 0.5; }
        .mood-btn.active { filter: grayscale(0); transform: scale(1.2); opacity: 1; }

        /* LISTS */
        .ev-card { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border-left: 5px solid var(--accent); }
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: var(--card); display: flex; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 0.7rem; color: var(--text-sec); cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: 600; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-end; }
        .modal-content { background: var(--card); width: 100%; padding: 30px 20px; border-radius: 30px 30px 0 0; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 15px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
    </style>
</head>
<body data-theme="light">

<div class="app">
    <header>
        <div class="top-row">
            <div class="brand">Luvyx</div>
            <div class="widgets">
                <span id="weather-info">Načítání...</span>
                <span id="clock">00:00</span>
                <span onclick="toggleTheme()" style="cursor:pointer">🌓</span>
            </div>
        </div>
    </header>

    <div id="p-month" class="page active">
        <div class="calendar-card">
            <div id="m-label" style="font-weight: 600; margin-bottom: 15px; font-size: 0.8rem; letter-spacing: 1px;"></div>
            <div class="grid" style="font-size:0.6rem; font-weight:700; color:var(--text-sec); margin-bottom:10px">
                <div>PO</div><div>ÚT</div><div>ST</div><div>ČT</div><div>PÁ</div><div>SO</div><div>NE</div>
            </div>
            <div class="grid" id="m-days"></div>
        </div>
        
        <div class="mood-bar">
            <span class="mood-btn" id="mood-happy" onclick="saveMood('happy')">😊</span>
            <span class="mood-btn" id="mood-neutral" onclick="saveMood('neutral')">😐</span>
            <span class="mood-btn" id="mood-sad" onclick="saveMood('sad')">😔</span>
        </div>

        <div id="upcoming-list" style="margin-top:20px"></div>
    </div>

    <div id="p-detail" class="page">
        <h3 id="detail-date-label">Detail</h3>
        <div id="detail-events"></div>
        <button onclick="nav('month')" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px; border-radius:10px; width:100%; margin-top:20px">Zpět do kalendáře</button>
    </div>

    <div id="p-year" class="page">
        <div id="year-container" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;"></div>
    </div>

    <nav class="nav">
        <div class="nav-item" onclick="nav('year')">Rok</div>
        <div class="nav-item active" onclick="nav('month')">Měsíc</div>
        <div class="nav-item" onclick="openModal()" style="font-weight:bold; color:var(--accent)">+ Přidat</div>
    </nav>
</div>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Nová událost</h3>
        <input type="text" id="ev-name" placeholder="Název">
        <input type="date" id="ev-date">
        <button onclick="saveEvent()" style="width:100%; padding:15px; border-radius:15px; background:var(--accent); color:white; border:none">Uložit</button>
    </div>
</div>

<script>
    let events = JSON.parse(localStorage.getItem('luvyx_final_v1')) || [];
    let moods = JSON.parse(localStorage.getItem('luvyx_moods_v1')) || {};
    let selectedDate = new Date().toISOString().split('T')[0];

    // WEATHER API (Open-Meteo)
    async function fetchWeather() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                document.getElementById('weather-info').innerText = `${Math.round(data.current_weather.temperature)}°C 📍`;
            } catch (e) {
                document.getElementById('weather-info').innerText = "--°C";
            }
        });
    }

    function initClock() {
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('cs-CZ', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    }

    function toggleTheme() {
        document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    }

    function nav(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+p).classList.add('active');
        if(p === 'month') renderMonth();
        if(p === 'year') renderYear();
    }

    // MOOD LOGIC
    function saveMood(m) {
        moods[selectedDate] = m;
        localStorage.setItem('luvyx_moods_v1', JSON.stringify(moods));
        updateMoodUI();
    }

    function updateMoodUI() {
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        const currentMood = moods[selectedDate];
        if(currentMood) document.getElementById('mood-'+currentMood).classList.add('active');
    }

    // MONTH RENDER
    function renderMonth() {
        const grid = document.getElementById('m-days');
        const now = new Date();
        document.getElementById('m-label').innerText = now.toLocaleDateString('cs-CZ', {month:'long', year:'numeric'}).toUpperCase();
        grid.innerHTML = '';
        
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const offset = firstDay === 0 ? 6 : firstDay - 1;

        for(let i=0; i<offset; i++) grid.innerHTML += '<div></div>';

        for(let d=1; d<=daysInMonth; d++) {
            const dStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            const isToday = dStr === new Date().toISOString().split('T')[0];
            const isSelected = dStr === selectedDate;
            const hasEv = events.some(e => e.date === dStr);
            
            grid.innerHTML += `<div class="day ${isToday?'today':''} ${isSelected?'selected':''} ${hasEv?'has-ev':''}" 
                                onclick="openDay('${dStr}')">${d}</div>`;
        }
        updateMoodUI();
    }

    function openDay(date) {
        selectedDate = date;
        document.getElementById('detail-date-label').innerText = new Date(date).toLocaleDateString('cs-CZ', {day:'numeric', month:'long'});
        const list = document.getElementById('detail-events');
        const dayEvs = events.filter(e => e.date === date);
        list.innerHTML = dayEvs.length ? dayEvs.map(e => `
            <div class="ev-card">
                <div style="flex-grow:1"><h4>${e.name}</h4></div>
                <span onclick="deleteEv(${e.id})" style="cursor:pointer">✕</span>
            </div>`).join('') : '<p style="text-align:center; opacity:0.5">Žádné akce</p>';
        nav('detail');
    }

    function renderYear() {
        const cont = document.getElementById('year-container');
        cont.innerHTML = '';
        const y = new Date().getFullYear();
        for(let m=0; m<12; m++) {
            let days = new Date(y, m+1, 0).getDate();
            let html = `<div style="background:var(--card); padding:5px; border-radius:10px; font-size:0.5rem; text-align:center">
                <strong>${m+1}</strong><div style="display:grid; grid-template-columns:repeat(7,1fr); gap:1px">`;
            for(let d=1; d<=days; d++) {
                const dStr = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                html += `<div style="width:3px; height:3px; background:${events.some(e=>e.date===dStr)?'var(--accent)':'var(--border)'}; border-radius:50%"></div>`;
            }
            cont.innerHTML += html + '</div></div>';
        }
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveEvent() {
        const n = document.getElementById('ev-name').value;
        const d = document.getElementById('ev-date').value;
        if(n && d) {
            events.push({id: Date.now(), name: n, date: d});
            localStorage.setItem('luvyx_final_v1', JSON.stringify(events));
            closeModal(); renderMonth();
        }
    }

    function deleteEv(id) {
        events = events.filter(e => e.id !== id);
        localStorage.setItem('luvyx_final_v1', JSON.stringify(events));
        openDay(selectedDate);
    }

    fetchWeather();
    initClock();
    renderMonth();
</script>
</body>
    </html>
