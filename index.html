<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvyx Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --accent: #3b82f6;
            --text: #1a1a1a;
            --text-secondary: #757575;
            --border: #eeeeee;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            padding-bottom: 100px;
            position: relative;
        }

        /* --- HEADER --- */
        header {
            padding: 50px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-title { font-size: 2rem; font-weight: 600; }
        .add-btn { font-size: 2rem; cursor: pointer; color: var(--text); padding: 0 10px; }

        /* --- SECTIONS --- */
        .page { display: none; padding: 0 15px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- CALENDAR CARD --- */
        .calendar-card {
            background: var(--card);
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .grid-head { font-size: 0.7rem; color: var(--text-secondary); font-weight: 600; margin-bottom: 15px; }
        
        .day {
            padding: 12px 0;
            font-size: 0.9rem;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .day:hover { background: #f0f0f0; }
        .day.selected { background: var(--accent); color: white; font-weight: 600; }
        .day.has-event::after {
            content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; background: var(--accent); border-radius: 50%;
        }

        /* --- UPCOMING SECTION --- */
        .upcoming-header { font-size: 0.9rem; font-weight: 600; margin: 30px 0 15px 5px; color: var(--text-secondary); }
        
        .event-item {
            background: var(--card);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .ev-line { width: 4px; height: 25px; border-radius: 10px; margin-right: 15px; background: var(--accent); }
        .ev-info h4 { margin: 0; font-size: 0.95rem; font-weight: 500; }
        .ev-info p { margin: 3px 0 0; font-size: 0.75rem; color: var(--text-secondary); }
        .tag-soon { background: #fee2e2; color: #ef4444; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }

        /* --- BOTTOM NAV --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; max-width: 450px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; padding: 15px 0 30px;
            border-top: 1px solid var(--border);
        }
        .nav-link { text-align: center; color: var(--text-secondary); font-size: 0.75rem; cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-link.active { color: var(--accent); font-weight: 600; }
        .nav-link svg { display: block; margin: 0 auto 5px; width: 20px; height: 20px; fill: currentColor; }

        /* --- FORM MODAL --- */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); z-index: 1000; justify-content: center; align-items: flex-end;
        }
        .modal-content {
            background: var(--card); width: 100%; max-width: 450px; padding: 30px 20px;
            border-top-left-radius: 30px; border-top-right-radius: 30px; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        input { width: 100%; border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 15px; font-family: inherit; box-sizing: border-box; }
        .save-btn { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0">Nová událost</h3>
            <input type="text" id="evName" placeholder="Co se bude dít?">
            <input type="date" id="evDate">
            <button class="save-btn" onclick="saveEvent()">Uložit do kalendáře</button>
        </div>
    </div>

    <div id="page-mesic" class="page active">
        <header>
            <div class="view-title">Březen <span>2026</span></div>
            <div class="add-btn" onclick="openModal()">+</div>
        </header>
        
        <div class="calendar-card">
            <div class="grid grid-head">
                <div>PO</div><div>ÚT</div><div>ST</div><div>ČT</div><div>PÁ</div><div>SO</div><div>NE</div>
            </div>
            <div class="grid" id="calendar-days">
                </div>
        </div>

        <div class="upcoming-header">NADCHÁZEJÍCÍ UDÁLOSTI</div>
        <div id="global-upcoming"></div>
    </div>

    <div id="page-rok" class="page">
        <header><div class="view-title">2026</div></header>
        <div style="text-align:center; color:gray; padding:50px;">Zobrazení celého roku</div>
    </div>

    <div id="page-den" class="page">
        <header>
            <div class="view-title" id="detail-date-title">Detail dne</div>
            <div class="add-btn" onclick="openModal()">+</div>
        </header>
        <div id="day-detail-list"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-link" onclick="switchPage('rok')">Rok</div>
        <div class="nav-link active" onclick="switchPage('mesic')">Měsíc</div>
        <div class="nav-link" onclick="switchPage('den')">Den</div>
    </nav>
</div>

<script>
    let events = JSON.parse(localStorage.getItem('luvyx_v3')) || [
        { name: 'Launch Knížky', date: '2026-03-28' },
        { name: 'Narozeniny', date: '2026-03-25' }
    ];

    let selectedDate = '2026-03-25';

    // PŘEPÍNÁNÍ STRÁNEK
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        
        document.getElementById('page-' + pageId).classList.add('active');
        const activeLink = Array.from(document.querySelectorAll('.nav-link')).find(l => l.innerText.toLowerCase() === pageId);
        if(activeLink) activeLink.classList.add('active');

        if(pageId === 'den') renderDayDetail(selectedDate);
    }

    // MODAL
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveEvent() {
        const name = document.getElementById('evName').value;
        const date = document.getElementById('evDate').value;
        if(name && date) {
            events.push({ name, date });
            localStorage.setItem('luvyx_v3', JSON.stringify(events));
            document.getElementById('evName').value = '';
            closeModal();
            renderAll();
        }
    }

    // RENDER KALENDÁŘE
    function renderCalendar() {
        const container = document.getElementById('calendar-days');
        container.innerHTML = '';
        
        // Jednoduchý březen 2026 (začíná nedělí)
        for(let i = 1; i <= 31; i++) {
            const dateStr = `2026-03-${i.toString().padStart(2, '0')}`;
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            if(dateStr === selectedDate) dayDiv.classList.add('selected');
            if(events.some(e => e.date === dateStr)) dayDiv.classList.add('has-event');
            
            dayDiv.innerText = i;
            dayDiv.onclick = () => {
                selectedDate = dateStr;
                switchPage('den');
            };
            container.appendChild(dayDiv);
        }
    }

    // RENDER NADCHÁZEJÍCÍCH (Globální sekce)
    function renderUpcoming() {
        const container = document.getElementById('global-upcoming');
        container.innerHTML = '';
        const today = new Date();

        const sorted = events
            .filter(e => new Date(e.date) >= today.setHours(0,0,0,0))
            .sort((a,b) => new Date(a.date) - new Date(b.date));

        sorted.slice(0, 3).forEach(ev => {
            const isSoon = (new Date(ev.date) - new Date()) / (1000*60*60*24) <= 3;
            container.innerHTML += `
                <div class="event-item">
                    <div class="ev-line"></div>
                    <div class="ev-info">
                        <h4>${ev.name} ${isSoon ? '<span class="tag-soon">ZA 3 DNY</span>' : ''}</h4>
                        <p>${new Date(ev.date).toLocaleDateString('cs-CZ')}</p>
                    </div>
                </div>
            `;
        });
    }

    // RENDER DETAILU DNE
    function renderDayDetail(date) {
        const title = document.getElementById('detail-date-title');
        const list = document.getElementById('day-detail-list');
        title.innerText = new Date(date).toLocaleDateString('cs-CZ', { day: 'numeric', month: 'long' });
        
        const dayEvents = events.filter(e => e.date === date);
        list.innerHTML = dayEvents.length 
            ? dayEvents.map(e => `
                <div class="event-item">
                    <div class="ev-line" style="background:#000"></div>
                    <div class="ev-info"><h4>${e.name}</h4><p>Celý den</p></div>
                </div>`).join('')
            : '<p style="text-align:center; color:gray; margin-top:40px;">Žádné události pro tento den.</p>';
    }

    function renderAll() {
        renderCalendar();
        renderUpcoming();
    }

    renderAll();
</script>

</body>
</html>
